<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="16" fill="#0f0f0f"/>
  <text x="400" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#e0e0e0">4 Strategies for Testing AI Agents</text>

  <!-- Card 1 -->
  <rect x="32" y="80" width="356" height="170" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="32" y="80" width="356" height="40" rx="12" fill="#7c3aed"/>
  <rect x="32" y="108" width="356" height="12" fill="#7c3aed"/>
  <text x="210" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#fff">1. Semantic Assertions</text>
  <text x="52" y="145" font-family="monospace" font-size="12" fill="#a78bfa">expect(response).toContainIntent(</text>
  <text x="52" y="165" font-family="monospace" font-size="12" fill="#a78bfa">  'weather info for Tokyo'</text>
  <text x="52" y="185" font-family="monospace" font-size="12" fill="#a78bfa">)</text>
  <text x="52" y="215" font-family="Inter, sans-serif" font-size="12" fill="#888">Assert on intent, not exact output.</text>
  <text x="52" y="233" font-family="Inter, sans-serif" font-size="12" fill="#888">Uses embeddings or LLM-as-judge.</text>

  <!-- Card 2 -->
  <rect x="412" y="80" width="356" height="170" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="412" y="80" width="356" height="40" rx="12" fill="#7c3aed"/>
  <rect x="412" y="108" width="356" height="12" fill="#7c3aed"/>
  <text x="590" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#fff">2. Property-Based Testing</text>
  <text x="432" y="145" font-family="monospace" font-size="12" fill="#a78bfa">def test_safety(prompt):</text>
  <text x="432" y="165" font-family="monospace" font-size="12" fill="#a78bfa">  res = model.generate(prompt)</text>
  <text x="432" y="185" font-family="monospace" font-size="12" fill="#a78bfa">  assert not harmful(res)</text>
  <text x="432" y="215" font-family="Inter, sans-serif" font-size="12" fill="#888">Test invariants, not specific outputs.</text>
  <text x="432" y="233" font-family="Inter, sans-serif" font-size="12" fill="#888">Safety, format, relevance, latency.</text>

  <!-- Card 3 -->
  <rect x="32" y="275" width="356" height="170" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="32" y="275" width="356" height="40" rx="12" fill="#7c3aed"/>
  <rect x="32" y="303" width="356" height="12" fill="#7c3aed"/>
  <text x="210" y="301" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#fff">3. Human-in-the-Loop Gates</text>
  <text x="52" y="340" font-family="monospace" font-size="12" fill="#a78bfa">AI proposes → Human reviews →</text>
  <text x="52" y="360" font-family="monospace" font-size="12" fill="#a78bfa">Gate passes/blocks → Feedback</text>
  <text x="52" y="390" font-family="Inter, sans-serif" font-size="12" fill="#888">AI is fast and thorough. Human is</text>
  <text x="52" y="408" font-family="Inter, sans-serif" font-size="12" fill="#888">careful and contextual. Both needed.</text>

  <!-- Card 4 -->
  <rect x="412" y="275" width="356" height="170" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="412" y="275" width="356" height="40" rx="12" fill="#7c3aed"/>
  <rect x="412" y="303" width="356" height="12" fill="#7c3aed"/>
  <text x="590" y="301" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#fff">4. Observability-Driven</text>
  <text x="432" y="340" font-family="monospace" font-size="12" fill="#a78bfa">trace = collectTrace({</text>
  <text x="432" y="360" font-family="monospace" font-size="12" fill="#a78bfa">  steps, decisions, outputs</text>
  <text x="432" y="380" font-family="monospace" font-size="12" fill="#a78bfa">})</text>
  <text x="432" y="410" font-family="Inter, sans-serif" font-size="12" fill="#888">Shift from pre-assertions to</text>
  <text x="432" y="428" font-family="Inter, sans-serif" font-size="12" fill="#888">post-execution pattern analysis.</text>

  <text x="400" y="482" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#555">nelthor.qzz.io/blog/testing-ai-agents</text>
</svg>
